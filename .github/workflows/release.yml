name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # Bun cross-compiles every target from Linux, so one job builds all 4.
      # VERSION is derived from the pushed tag (strip the leading "v").
      - name: Cross-build all targets
        run: VERSION=${GITHUB_REF_NAME#v} bash scripts/build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/nbusd-*
            dist/nbus-*
            dist/SHA256SUMS
